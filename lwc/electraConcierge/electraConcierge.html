<template>
    <div class="concierge-container">
        <header class="site-header">
            <!--<img src={logoUrl} class="cms-logo" alt="Electra Cars" onerror={handleLogoError} />-->
        </header>

        <template if:true={vehicle}>
            <nav class="top-nav">
                <span onclick={navigateToVehicle} class="back-link" style="cursor: pointer;">
                    {backLinkLabel}
                </span>
            </nav>

            <div class="main-layout animate-in">
                <section class="content-side">
                    <div class="hero-banner" style={heroStyle}>
                        <div class="hero-overlay">
                            <p class="subtitle">BOOK YOUR TEST DRIVE</p>
                            <h1>{vehicle.title}</h1>
                            <p class="mini-specs">Electra Series • AWD • 100% Electric</p>
                        </div>
                    </div>

                    <div class="dynamic-grid slds-p-horizontal_large slds-p-bottom_large" style="padding-top: 10px;">
                        
                        <div class="card spec-card slds-p-around_large">
                            <div class="card-header slds-m-bottom_medium">
                                <h2 class="slds-text-title_caps slds-text-color_weak">CAR SPECS - SUMMARY</h2>
                            </div>
                            <div class="spec-list">
                                <div class="spec-row slds-p-vertical_xx-small">
                                    <span class="label slds-text-color_weak">Cost: </span>
                                    <span class="val slds-text-title_bold">{displayPrice}</span> 
                                </div>
                                <div class="spec-row slds-p-vertical_xx-small">
                                    <span class="label slds-text-color_weak">0-100kmph:</span>
                                    <span class="val slds-text-title_bold">5.4 secs</span>
                                </div>
                                <div class="spec-row slds-p-vertical_xx-small">
                                    <span class="label slds-text-color_weak">Battery:</span>
                                    <span class="val slds-text-title_bold">100 kWh</span>
                                </div>
                            </div>
                            <button class="btn-primary-black slds-m-top_medium" onclick={navigateToSpecs}>
                                VIEW FULL SPECS
                            </button>
                        </div>

                        <template if:true={isBookingConfirmed}>
                            <div class="card calendar-card slds-p-around_large animate-in">
                                <div class="card-header slds-m-bottom_medium">
                                    <h2 class="slds-text-title_caps slds-text-color_weak">CONFIRMED APPOINTMENT</h2>
                                </div>
                                <div class="calendar-content">
                                    <div class="calendar-visual slds-m-bottom_medium slds-p-around_small slds-theme_default slds-box slds-box_x-small slds-text-align_center slds-m-horizontal_auto slds-m-bottom_medium" style="max-width:250px;">
                                        <p class="slds-text-heading_small"><b>May 2026</b></p>
                                        <div class="calendar-days slds-grid slds-wrap slds-m-top_x-small" style="font-size:0.8rem;">
                                            <span class="slds-size_1-of-7 slds-text-align_center">S</span>
                                            <span class="slds-size_1-of-7 slds-text-align_center">M</span>
                                            <span class="slds-size_1-of-7 slds-text-align_center">T</span>
                                            <span class="slds-size_1-of-7 slds-text-align_center">W</span>
                                            <span class="slds-size_1-of-7 slds-text-align_center">T</span>
                                            <span class="slds-size_1-of-7 slds-text-align_center">F</span>
                                            <span class="slds-size_1-of-7 slds-text-align_center">S</span>
                                            <span class="slds-size_1-of-7"></span><span class="slds-size_1-of-7"></span><span class="slds-size_1-of-7"></span><span class="slds-size_1-of-7"></span><span class="slds-size_1-of-7"></span>
                                            <span class="slds-size_1-of-7 slds-text-align_center slds-text-color_weak">1</span>
                                            <span class="slds-size_1-of-7 slds-text-align_center slds-text-color_weak">2</span>
                                            <span class="slds-size_1-of-7 slds-text-align_center slds-text-color_weak">3</span>
                                            <span class="slds-size_1-of-7 slds-text-align_center slds-text-color_weak">4</span>
                                            <span class="slds-size_1-of-7 slds-text-align_center slds-text-color_weak">5</span>
                                            <span class="slds-size_1-of-7 slds-text-align_center slds-text-color_weak">6</span>
                                            <span class="slds-size_1-of-7 slds-text-align_center slds-text-color_weak">7</span>
                                            <span class="slds-size_1-of-7 slds-text-align_center slds-text-color_weak">8</span>
                                            <span class="slds-size_1-of-7 slds-text-align_center slds-text-color_weak">9</span>
                                            <span class="slds-size_1-of-7 slds-text-align_center slds-text-color_weak">10</span>
                                            <span class="slds-size_1-of-7 slds-text-align_center slds-text-color_weak">11</span>
                                            <span class="slds-size_1-of-7 slds-text-align_center slds-text-color_weak">12</span>
                                            <span class="slds-size_1-of-7 slds-text-align_center slds-text-color_weak">13</span>
                                            <span class="slds-size_1-of-7 slds-text-align_center slds-text-color_weak">14</span>
                                            <span class="slds-size_1-of-7 slds-text-align_center slds-text-color_weak">15</span>
                                            <span class="slds-size_1-of-7 slds-text-align_center slds-is-selected slds-box slds-box_xx-small slds-p-around_none slds-theme_success" style="color:white !important; border-radius:50%; width:24px; height:24px; display:inline-block;"><b>16</b></span>
                                        </div>
                                    </div>
                                    
                                    <div class="summary-details">
                                        <p><lightning-icon icon-name="utility:check" size="x-small" variant="success"></lightning-icon> <strong>STATUS:</strong> Confirmed</p>
                                        <p><strong>VEHICLE:</strong> {vehicle.title}</p>
                                        <p><strong>DATE:</strong> {appointmentDate}</p>
                                        <p><strong>TIME:</strong> {appointmentTime} (Selected)</p>
                                        <p><strong>LOCATION:</strong> {city} Showroom</p>
                                    </div>
                                </div>
                            </div>
                        </template>
                    </div>
                    </section>

                <aside class="agent-sidebar">
                    <div class="chat-header-orange">
                        <div class="agent-brand">
                            <div class="agent-logo-container">
                                <lightning-icon icon-name="utility:frozen" size="small" variant="inverse"></lightning-icon>
                            </div>
                            <div class="agent-titles">
                                <h3>Electra Assistant</h3>
                                <p>Powered by Agentforce</p>
                            </div>
                        </div>
                        <!--<span class="live-badge">LIVE</span>-->
                        <div class="header-actions">
                            <template if:true={isSessionActive}>
                                <button class="end-chat-btn" onclick={handleRestartChat}>END CHAT</button>
                            </template>
                            <span class={statusBadgeClass}>{statusLabel}</span>
                        </div>
                    </div>

                    <div class="chat-viewport">
                        <template for:each={chatMessages} for:item="msg">
                            <div key={msg.id} class={msg.bubbleClass}>
                                <div class="msg-bubble">{msg.text}</div>

                                <template if:true={msg.hasOptions}>
                                    <div class="options-container slds-m-top_x-small">
                                        <template for:each={msg.options} for:item="opt">
                                            <button key={opt} class="option-chip" data-val={opt} onclick={handleOptionClick}>
                                                {opt}
                                            </button>
                                        </template>
                                    </div>
                                </template>

                                <template if:true={msg.isSlotResponse}>
                                    <c-electra-slot-picker 
                                        slots-data={msg.slotOptions} 
                                        onselect={handleSlotSelection}>
                                    </c-electra-slot-picker>
                                </template>
                            </div>
                        </template>

                        <template if:true={isTyping}>
                            <div class="msg-container agent">
                                <div class="msg-bubble typing-dots">Processing your request...</div>
                            </div>
                        </template>
                    </div>

                    <div class="chat-footer-dark">
                        <template if:true={isSessionActive}>
                            <div class="input-container">
                                <input type="text" placeholder="Ask me anything..." value={userInput} onchange={handleInputChange} onkeydown={handleKeyPress} />
                                <div class="input-button-group">
                                    <button class="send-btn" onclick={handleSendMessage}>
                                        <lightning-icon icon-name="utility:send" size="x-small" variant="inverse"></lightning-icon>
                                    </button>
                                    <button class={micBtnClass} onclick={toggleVoice}>
                                        <svg width="18" height="18" viewBox="0 0 52 52" class="mic-svg-orange">
                                            <path d="M26 34c5.1 0 9.2-4.1 9.2-9.2V11.2c0-5.1-4.1-9.2-9.2-9.2s-9.2 4.1-9.2 9.2v13.5c0 5.2 4.1 9.3 9.2 9.3zM40.5 22c-.8 0-1.5.7-1.5 1.5v1.2c0 7.2-5.8 13-13 13s-13-5.8-13-13v-1.2c0-.8-.7-1.5-1.5-1.5s-1.5.7-1.5 1.5v1.2c0 8.3 6.3 15.2 14.5 15.9V47c0 .8.7 1.5 1.5 1.5s1.5-.7 1.5-1.5v-6.2c8.2-.7 14.5-7.6 14.5-15.9v-1.2c0-.8-.7-1.5-1.5-1.5z"></path>
                                        </svg>
                                    </button>
                                </div>
                            </div>
                        </template>
                        <template if:false={isSessionActive}>
                            <button class="btn-restart-orange" onclick={handleRestartChat}>
                                START NEW CONVERSATION
                            </button>
                        </template>
                    </div>
                </aside>
            </div>
        </template>

        <template if:false={vehicle}>
            <!--<div class="loading-state slds-align_absolute-center" style="height: 70vh; flex-direction: column;">
                <template if:true={error}>
                    <lightning-icon icon-name="utility:warning" variant="warning" size="large"></lightning-icon>
                    <p class="slds-m-top_medium">{error}</p>
                </template>
                <template if:false={error}>
                    <lightning-spinner alternative-text="Loading..." size="large"></lightning-spinner>
                    <p class="slds-m-top_large">Initializing Concierge Session...</p>
                </template>
            </div>-->
            <div class="slds-p-around_large slds-align_absolute-center" style="height: 80vh;">
                <lightning-spinner alternative-text="Initializing Agentforce Concierge..." size="large" variant="brand"></lightning-spinner>
            </div>
        </template>

    </div>
</template>
